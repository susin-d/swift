name: Campus Food Delivery Pipeline

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Node.js Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run Tests & Coverage
        working-directory: ./backend
        run: npm test -- --coverage

  user-app-tests:
    name: User App (Flutter) Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Dependencies
        working-directory: ./user_app
        run: flutter pub get
      - name: Analyze
        working-directory: ./user_app
        run: flutter analyze
      - name: Run Tests
        working-directory: ./user_app
        run: flutter test --coverage

  vendor-app-tests:
    name: Vendor App (Flutter) Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Dependencies
        working-directory: ./vendor_app
        run: flutter pub get
      - name: Analyze
        working-directory: ./vendor_app
        run: flutter analyze
      - name: Run Tests
        working-directory: ./vendor_app
        run: flutter test --coverage

  admin-app-tests:
    name: Admin App (Flutter) Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Dependencies
        working-directory: ./admin_app
        run: flutter pub get
      - name: Analyze
        working-directory: ./admin_app
        run: flutter analyze
      - name: Run Widget Tests
        working-directory: ./admin_app
        run: flutter test --coverage
